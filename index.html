<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Password generator app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/style.css" />
    <script type="module" src="/script.js"></script>
  </head>
  <body>
    <main class="password-generator">
      <h1 class="password-generator__title">Password Generator</h1>

      <section
        class="password-generator__display"
        aria-label="Generated password"
      >
        <output class="password-generator__password is-empty">P4$5W0rD!</output>

        <div class="password-generator__copy">
          <label
            class="password-generator__copy-text"
            for="copy-button"
          ></label>
          <button
            class="password-generator__copy-button"
            type="button"
            aria-label="Copy password"
          >
            <svg
              class="copy-icon"
              width="21"
              height="24"
              viewBox="0 0 21 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M17 0H3C1.9 0 1 .9 1 2V16H3V2H17V0ZM20 4H7C5.9 4 5 .9 5 6V22C5 23.1 5.9 24 7 24H20C21.1 24 22 23.1 22 22V6C22 4.9 21.1 4 20 4ZM20 22H7V6H20V22Z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
      </section>
      <p class="password-generator__display__error"></p>
      <form class="password-generator__form">
        <div class="password-generator__length-header">
          <label for="char-length">Character Length</label>
          <output class="password-generator__length-value" for="char-length"
            >0</output
          >
        </div>

        <input
          class="password-generator__range"
          type="range"
          id="char-length"
          name="char-length"
          min="0"
          max="20"
          value="0"
        />

        <fieldset class="password-generator__options">
          <legend class="sr-only">Password options</legend>

          <label class="password-generator__option">
            <input type="checkbox" name="uppercase" />
            <span class="checkbox">
              <svg class="check-icon" viewBox="0 0 16 16">
                <path
                  d="M3 8L6 11L13 4"
                  stroke="#18171f"
                  stroke-width="2"
                  fill="none"
                />
              </svg>
            </span>
            Include Uppercase Letters
          </label>

          <label class="password-generator__option">
            <input type="checkbox" name="lowercase" />
            <span class="checkbox">
              <svg class="check-icon" viewBox="0 0 16 16">
                <path
                  d="M3 8L6 11L13 4"
                  stroke="#18171f"
                  stroke-width="2"
                  fill="none"
                />
              </svg>
            </span>
            Include Lowercase Letters
          </label>

          <label class="password-generator__option">
            <input type="checkbox" name="numbers" />
            <span class="checkbox">
              <svg class="check-icon" viewBox="0 0 16 16">
                <path
                  d="M3 8L6 11L13 4"
                  stroke="#18171f"
                  stroke-width="2"
                  fill="none"
                />
              </svg>
            </span>
            Include Numbers
          </label>

          <label class="password-generator__option">
            <input type="checkbox" name="symbols" />
            <span class="checkbox">
              <svg class="check-icon" viewBox="0 0 16 16">
                <path
                  d="M3 8L6 11L13 4"
                  stroke="#18171f"
                  stroke-width="2"
                  fill="none"
                />
              </svg>
            </span>
            Include Symbols
          </label>
        </fieldset>

        <section
          class="password-generator__strength"
          aria-label="Password strength"
        >
          <span class="password-generator__strength-label">Strength</span>

          <div class="password-generator__strength-result" aria-live="polite">
            <output class="password-generator__strength-text">Medium</output>
            <svg
              class="password-generator__strength-bars"
              width="64"
              height="28"
              viewBox="0 0 64 28"
              aria-hidden="true"
              focusable="false"
            >
              <rect
                class="strength-bar strength-bar--1"
                x="0"
                y="4"
                width="10"
                height="20"
              />
              <rect
                class="strength-bar strength-bar--2"
                x="18"
                y="4"
                width="10"
                height="20"
              />
              <rect
                class="strength-bar strength-bar--3"
                x="36"
                y="4"
                width="10"
                height="20"
              />
              <rect
                class="strength-bar strength-bar--4"
                x="54"
                y="4"
                width="10"
                height="20"
              />
            </svg>
          </div>
        </section>

        <button class="password-generator__submit" type="submit">
          <div class="password-generator__submit__text">Generate</div>
          <svg
            class="submit-icon"
            width="12"
            height="12"
            viewBox="0 0 12 12"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M1 6H11M11 6L6 1M11 6L6 11"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            />
          </svg>
        </button>
      </form>
    </main>
    <footer>
      <p class="attribution">
        Challenge by
        <a
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          rel="noopener noreferrer"
        >
          Frontend Mentor</a
        >. Coded by
        <a
          href="https://github.com/RemiPish"
          target="_blank"
          rel="noopener noreferrer"
          >Rémi P</a
        >.
      </p>
    </footer>
  </body>
</html>
